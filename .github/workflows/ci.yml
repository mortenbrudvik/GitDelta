name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test:
    name: Build & Test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore GitDelta.sln

      - name: Build (Release, warnings = errors)
        run: dotnet build GitDelta.sln -c Release --no-restore

      - name: Test
        run: dotnet test GitDelta.sln -c Release --no-build --verbosity normal
